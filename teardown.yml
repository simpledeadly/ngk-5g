---
- name: Teardown Open5GS Core and OAI gNB
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: 1. Stop Open5GS and MongoDB services
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - mongod
        - open5gs-mmed
        - open5gs-sgwcd
        - open5gs-sgwud
        - open5gs-smfd
        - open5gs-upfd
        - open5gs-hssd
        - open5gs-pcrfd
        - open5gs-nrfd
        - open5gs-scpd
        - open5gs-seppd
        - open5gs-amfd
        - open5gs-ausfd
        - open5gs-udmd
        - open5gs-udrd
        - open5gs-nssfd
        - open5gs-bsfd
        - open5gs-pcfd
      ignore_errors: yes

    - name: 2. Purge Open5GS, MongoDB, NodeJS and UHD
      apt:
        name:
          - open5gs
          - mongodb-org
          - mongodb-org-database
          - mongodb-org-server
          - mongodb-org-shell
          - mongodb-org-mongos
          - mongodb-org-tools
          - nodejs
          - uhd-host
          - libuhd-dev
        state: absent
        purge: yes
        autoremove: yes
      ignore_errors: yes

    - name: 3. Remove repositories and GPG keys
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/mongodb-org-8.0.list
        - /etc/apt/sources.list.d/open5gs-ubuntu-latest-jammy.list
        - /usr/share/keyrings/mongodb-server-8.0.gpg

    - name: 4. Remove directories (Configs, DBs, OAI code)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/open5gs
        - /var/lib/mongodb
        - /var/log/mongodb
        - /opt/openairinterface5g
        - /usr/share/uhd/images
        - /usr/lib/node_modules
        - /etc/apt/sources.list.d/ettusresearch-ubuntu-uhd-jammy.list

    - name: 5. Disable IPv4 forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: "0"
        state: present
        reload: yes

    - name: 6. Clean APT cache
      apt:
        autoclean: yes
