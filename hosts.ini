[servers]
# ==============================================================================
# ИНСТРУКЦИЯ (ШАБЛОН) ДЛЯ ЛАБОРАТОРИИ
# ==============================================================================
# Впишите ниже IP-адреса ваших серверов, а также логин и пароль от них.
# Строка `ansible_ssh_common_args...` нужна, чтобы Ansible не задавал лишних вопросов про ключи.
#
# Пример заполнения для вашей локальной сети:
# 192.168.1.101 ansible_user=ubuntu ansible_ssh_pass=qwerty12345 ansible_ssh_common_args='-o StrictHostKeyChecking=no'
# 192.168.1.102 ansible_user=ubuntu ansible_ssh_pass=qwerty12345 ansible_ssh_common_args='-o StrictHostKeyChecking=no'
# ==============================================================================

your-ipv4 ansible_user=username ansible_ssh_pass=password ansible_ssh_common_args='-o StrictHostKeyChecking=no'
