---
- name: Deploy Open5GS Core and OAI gNB
  hosts: localhost
  connection: local
  become: yes # it's like sudo
  vars:
    mcc: "250"
    mnc: "54"
    amf_ip: "127.0.0.5"
    gnb_ip_cidr: "127.0.0.5/24"
    oai_repo_url: "https://github.com/duranta-project/openairinterface5g.git"
    uhd_images_url: "https://github.com/EttusResearch/uhd/releases/download/v4.2.0.1/uhd-images_4.2.0.1.tar.xz"

  tasks:
    - name: 1. Enable IPv4 forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        reload: yes

    - name: 2. Install prerequisites (gnupg, curl, ca-certificates, git)
      apt:
        name:
          - gnupg
          - curl
          - ca-certificates
          - git
        state: present
        update_cache: yes

    - name: 3. Add MongoDB 7.0 GPG key
      shell: curl -fsSL https://pgp.mongodb.com/server-7.0.asc | gpg -o /usr/share/keyrings/mongodb-server-7.0.gpg --dearmor
      args:
        creates: /usr/share/keyrings/mongodb-server-7.0.gpg

    - name: 4. Add MongoDB 7.0 repository
      apt_repository:
        repo: "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse"
        state: present
        filename: mongodb-org-7.0

    - name: 5. Install MongoDB-org
      apt:
        name: mongodb-org
        state: present
        update_cache: yes

    - name: 6. Start and enable MongoDB service
      systemd:
        name: mongod
        state: started
        enabled: yes

    - name: 7. Add Open5GS PPA
      apt_repository:
        repo: ppa:open5gs/latest
        state: present

    - name: 8. Install Open5GS
      apt:
        name: open5gs
        state: present
        update_cache: yes

    - name: 9. Add NodeSource GPG key (Node 20)
      shell: curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
      args:
        creates: /etc/apt/keyrings/nodesource.gpg

    - name: 10. Add NodeSource repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main"
        state: present
        filename: nodesource

    - name: 11. Install NodeJS
      apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: 12. Download and run Open5GS WebUI install script
      shell: curl -fsSL https://open5gs.org/open5gs/assets/webui/install | bash -
      args:
        creates: /usr/lib/node_modules/open5gs/package.json

    - name: 13. Update Open5GS Configs (mcc)
      replace:
        path: "/etc/open5gs/{{ item }}"
        regexp: 'mcc: \d+'
        replace: "mcc: {{ mcc }}"
      loop:
        - amf.yaml
        - nrf.yaml
        - upf.yaml
        - mme.yaml
      ignore_errors: yes

    - name: 14. Update Open5GS Configs (mnc)
      replace:
        path: "/etc/open5gs/{{ item }}"
        regexp: 'mnc: \d+'
        replace: "mnc: {{ mnc }}"
      loop:
        - amf.yaml
        - nrf.yaml
        - upf.yaml
        - mme.yaml
      ignore_errors: yes

    - name: 15. Restart Open5GS services
      systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - open5gs-mmed
        - open5gs-sgwud
        - open5gs-nrfd
        - open5gs-amfd
        - open5gs-upfd

    - name: 16. Install OAI dependencies (libforms, cmake, etc.)
      apt:
        name:
          - libforms-dev
          - libforms-bin
          - cmake
          - cmake-qt-gui
          - unzip
        state: present

    - name: 17. Clone OpenAirInterface5G
      git:
        repo: "{{ oai_repo_url }}"
        dest: "/opt/openairinterface5g"
        depth: 1
        force: yes

    - name: 18. Add Ettus Research UHD PPA
      apt_repository:
        repo: ppa:ettusresearch/uhd
        state: present

    - name: 19. Install UHD host and libuhd-dev
      apt:
        name:
          - uhd-host
          - libuhd-dev
        state: present
        update_cache: yes

    - name: 20. Build OAI Dependencies
      shell: ./build_oai -I --install-optional-packages
      args:
        chdir: "/opt/openairinterface5g/cmake_targets"
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: 20.5. Compile OAI gNB and UE
      shell: ./build_oai -w USRP --eNB --UE --nrUE --gNB
      args:
        chdir: "/opt/openairinterface5g/cmake_targets"
        creates: "/opt/openairinterface5g/cmake_targets/ran_build/build/nr-softmodem"

    - name: 20.6. Create UHD images directory
      file:
        path: /usr/share/uhd/images
        state: directory
        mode: "0755"

    - name: 21. Download and Extract Official Ettus UHD Images via wget
      shell: |
        wget -qO /tmp/uhd-images.tar.xz "{{ uhd_images_url }}"
        tar -xf /tmp/uhd-images.tar.xz -C /usr/share/uhd/images --strip-components=1
        rm /tmp/uhd-images.tar.xz

    - name: 22. Configure gNB (mcc, mnc, IPs)
      shell: |
        CONF_FILE="/opt/openairinterface5g/targets/PROJECTS/GENERIC-NR-5GC/CONF/gnb.sa.band78.fr1.106PRB.usrpb210.conf"
        sed -i 's/mcc = [0-9]*/mcc = {{ mcc }}/g' $CONF_FILE
        sed -i 's/mnc = [0-9]*/mnc = {{ mnc }}/g' $CONF_FILE
        # Update AMF IP
        sed -i 's|ipv4 = "[^"]*"|ipv4 = "{{ amf_ip }}"|g' $CONF_FILE
        # Update GNB IPs
        sed -i 's|GNB_IPV4_ADDRESS_FOR_NG_AMF = "[^"]*"|GNB_IPV4_ADDRESS_FOR_NG_AMF = "{{ gnb_ip_cidr }}"|g' $CONF_FILE
        sed -i 's|GNB_IPV4_ADDRESS_FOR_NGU = "[^"]*"|GNB_IPV4_ADDRESS_FOR_NGU = "{{ gnb_ip_cidr }}"|g' $CONF_FILE
      args:
        executable: /bin/bash

    - name: 23. Install Realtime Kernel
      apt:
        name:
          - linux-image-5.15.0-1032-realtime
          - linux-modules-5.15.0-1032-realtime
          - linux-headers-5.15.0-1032-realtime
        state: present

    - name: 24. Update GRUB
      command: update-grub
