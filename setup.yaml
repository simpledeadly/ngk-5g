---
- name: Deploy Open5GS Core and OAI gNB
  hosts: servers
  # connection: local
  become: yes
  vars:
    oai_repo_url: "https://github.com/openairinterface/openairinterface5g.git"
    oai_version: "v2.2.0"
    uhd_images_url: "https://github.com/EttusResearch/uhd/releases/download/v4.2.0.1/uhd-images_4.2.0.1.tar.xz"

  tasks:
    - name: 1. Enable IPv4 forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        reload: yes

    - name: 2. Install apt prerequisites
      apt:
        name:
          - gnupg
          - curl
          - wget
          - ca-certificates
          - git
        state: present
        update_cache: yes

    - name: 3. Add MongoDB GPG key
      shell: curl -fsSL https://pgp.mongodb.com/server-7.0.asc | gpg -o /usr/share/keyrings/mongodb-server-7.0.gpg --dearmor
      args:
        creates: /usr/share/keyrings/mongodb-server-7.0.gpg

    - name: 4. Add MongoDB apt repo
      apt_repository:
        repo: "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse"
        state: present
        filename: mongodb-org-7.0

    - name: 5. Install MongoDB
      apt:
        name: mongodb-org
        state: present
        update_cache: yes

    - name: 6. Start MongoDB
      systemd:
        name: mongod
        state: started
        enabled: yes

    - name: 7. Add Open5GS PPA
      apt_repository:
        repo: ppa:open5gs/latest
        state: present

    - name: 8. Install Open5GS
      apt:
        name: open5gs
        state: present
        update_cache: yes

    - name: 9. Add NodeSource GPG key
      shell: |
        mkdir -p /etc/apt/keyrings
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
      args:
        creates: /etc/apt/keyrings/nodesource.gpg

    - name: 10. Add NodeSource repo
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main"
        state: present
        filename: nodesource

    - name: 11. Install NodeJS
      apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: 12. Install Open5GS WebUI
      shell: curl -fsSL https://open5gs.org/open5gs/assets/webui/install | bash -
      args:
        creates: /usr/lib/node_modules/open5gs/package.json

    - name: 13. Restart Open5GS
      systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - open5gs-mmed
        - open5gs-sgwud
        - open5gs-nrfd
        - open5gs-amfd
        - open5gs-upfd

    - name: 14. Install OAI deps
      apt:
        name:
          - libforms-dev
          - libforms-bin
          - cmake
          - cmake-qt-gui
          - unzip
        state: present

    - name: 15. Clone OAI repo
      git:
        repo: "{{ oai_repo_url }}"
        dest: "/opt/openairinterface5g"
        version: "{{ oai_version }}"
        depth: 1
        force: yes

    - name: 15b. Replace hardcoded C++ standards with C++17 in root CMakeLists
      replace:
        path: /opt/openairinterface5g/CMakeLists.txt
        regexp: '-std=(c|gnu)\+\+(11|14)'
        replace: '-std=\1++17'

    - name: 16. Add Ettus UHD PPA
      apt_repository:
        repo: ppa:ettusresearch/uhd
        state: present

    - name: 17. Install UHD host
      apt:
        name:
          - uhd-host
          - libuhd-dev
        state: present
        update_cache: yes

    - name: 17b. Clean CMake build directory to apply new flags
      file:
        path: /opt/openairinterface5g/cmake_targets/ran_build
        state: absent

    - name: 18. Build OAI deps
      shell: |
        source ../oaienv
        ./build_oai -I
      args:
        chdir: "/opt/openairinterface5g/cmake_targets"
        executable: /bin/bash
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: 19. Compile OAI
      shell: |
        source ../oaienv
        ./build_oai -w USRP --eNB --UE --nrUE --gNB
      args:
        chdir: "/opt/openairinterface5g/cmake_targets"
        executable: /bin/bash
        creates: "/opt/openairinterface5g/cmake_targets/ran_build/build/nr-softmodem"

    - name: 20. Create UHD dir
      file:
        path: /usr/share/uhd/images
        state: directory
        mode: "0755"

    - name: 21. Download UHD images
      shell: |
        wget -qO /tmp/uhd-images.tar.xz "{{ uhd_images_url }}"
        tar -xf /tmp/uhd-images.tar.xz -C /usr/share/uhd/images --strip-components=1
        rm /tmp/uhd-images.tar.xz
